<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="description" content="Smart Clock — a customizable focus timer with analog & digital displays, configurable context, and intelligent fullscreen auto‑hide.">
  <title>Smart Clock | Focus Timer</title>

  <!-- Tailwind CSS + Theme Configuration -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-dark': '#0f172a',
            'panel-dark': '#1e293b',
            'card-dark': '#334155',
            'accent-hour': '#f43f5e',
            'accent-minute': '#eab308',
            'accent-second': '#10b981',
            'accent-glow': '#f59e0b',
          },
          fontFamily: {
            'mono': ['"JetBrains Mono"', 'monospace'],
          },
          boxShadow: {
            'neumorph-dark': '25px 25px 75px rgba(0,0,0,0.75), 10px 10px 70px rgba(0,0,0,0.25), inset 5px 5px 10px rgba(0,0,0,0.5), inset 5px 5px 20px rgba(255,255,255,0.2), inset -5px -5px 15px rgba(0,0,0,0.75)',
            'neumorph-light': '5px 5px 10px rgba(0,0,0,0.5), inset 5px 5px 20px rgba(255,255,255,0.2), inset -5px -5px 15px rgba(0,0,0,0.75)',
            'inner-progress': 'inset 0 0 8px #00000055, 0 6px 12px rgba(0,0,0,0.3)',
          },
        }
      }
    }
  </script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-bg-dark font-['Inter'] flex justify-center items-center min-h-screen p-4 antialiased">
  <div class="dashboard flex flex-col max-w-7xl w-full min-h-[90vh]" id="dashboard">

    <!-- Main Content -->
    <div class="main-content flex-1 flex flex-wrap justify-center items-center gap-8 p-4">

      <!-- Clock Card -->
      <div class="clock-card bg-panel rounded-tl-[225px] rounded-tr-[225px] rounded-bl-2xl rounded-br-2xl shadow-neumorph-dark flex flex-col items-center justify-center p-8 min-w-[280px] flex-[1.2] transition-all duration-200" id="clockCard">

        <!-- Analog Clock -->
        <div class="clock relative w-72 h-72 md:w-80 md:h-80 lg:w-96 lg:h-96 bg-panel rounded-full shadow-[10px_50px_70px_rgba(0,0,0,0.25),inset_5px_5px_10px_rgba(0,0,0,0.5),inset_5px_5px_20px_rgba(255,255,255,0.2),inset_-5px_5px_15px_rgba(0,0,0,0.75)] flex justify-center items-center mb-6 before:content-[''] before:absolute before:w-3 before:h-3 before:bg-panel before:border-[3px] before:border-white before:rounded-full before:z-[1000]" id="analogClock" aria-label="Analog clock">
          <div class="circle" id="sc" style="--clr:#10b981;"><i></i></div>
          <div class="circle circle2" id="mn" style="--clr:#eab308;"><i></i></div>
          <div class="circle circle3" id="hr" style="--clr:#f43f5e;"><i></i></div>
          <span style="--i:1;"><b>1</b></span> <span style="--i:2;"><b>2</b></span>
          <span style="--i:3;"><b>3</b></span> <span style="--i:4;"><b>4</b></span>
          <span style="--i:5;"><b>5</b></span> <span style="--i:6;"><b>6</b></span>
          <span style="--i:7;"><b>7</b></span> <span style="--i:8;"><b>8</b></span>
          <span style="--i:9;"><b>9</b></span> <span style="--i:10;"><b>10</b></span>
          <span style="--i:11;"><b>11</b></span> <span style="--i:12;"><b>12</b></span>
        </div>

        <!-- Digital Clock -->
        <div id="time" class="flex py-2 px-5 text-2xl font-semibold border-2 border-black/50 rounded-[40px] shadow-neumorph-light bg-panel" aria-label="Digital clock">
          <div id="hours" class="relative w-[55px] font-medium text-center text-accent-hour">00</div>
          <div id="minutes" class="relative w-[55px] font-medium text-center text-accent-minute">00</div>
          <div id="seconds" class="relative w-[55px] font-medium text-center text-accent-second">00</div>
          <div id="ampm" class="text-sm flex justify-center items-center text-slate-200">AM</div>
        </div>
      </div>

      <!-- Timer Panel -->
      <div class="timer-panel bg-panel rounded-[2rem] p-7 shadow-neumorph-dark flex-1 min-w-[280px]" role="region" aria-label="Timer controls">

        <!-- Header with settings button -->
        <div class="timer-header flex items-center justify-between mb-4">
          <h2 id="timerContextHeading" class="text-2xl font-semibold bg-gradient-to-br from-accent-minute to-accent-glow bg-clip-text text-transparent tracking-tight">
            <i class="fas fa-clock mr-2"></i><span id="contextDisplay">TIMER CONTROL</span>
          </h2>
          <button id="settingsBtn" class="text-white/70 hover:text-white transition" title="Settings">
            <i class="fas fa-cog text-xl"></i>
          </button>
        </div>

        <!-- Custom details row (subject, etc.) -->
        <div id="customDetails" class="mb-4 text-center">
          <div id="subjectDisplay" class="text-sm text-slate-300 font-medium"></div>
          <div id="notesDisplay" class="text-xs text-slate-400 italic"></div>
        </div>

        <!-- Remaining Time -->
        <div class="big-remaining bg-slate-800 rounded-[2rem] py-3 px-2 text-center mb-4 shadow-inner-progress">
          <span id="remainingDisplay" class="font-mono text-4xl md:text-5xl font-bold text-accent-minute drop-shadow-[0_0_6px_#f59e0b] tracking-wider" aria-live="polite">00:00:00</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-wrapper my-4">
          <div class="progress-bar-bg bg-slate-700 rounded-[30px] h-2.5 overflow-hidden shadow-[inset_0_1px_3px_black]">
            <div class="progress-fill w-0 h-full bg-gradient-to-r from-accent-hour to-accent-minute rounded-[30px]" id="progressFill" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
          <div class="progress-percent text-right text-xs text-accent-minute mt-1 font-medium" id="progressPercent">0%</div>
        </div>

        <!-- Info Cards -->
        <div class="info-grid flex flex-wrap gap-3 justify-between my-5">
          <div class="info-card bg-card rounded-2xl py-2 px-3 text-center flex-1 min-w-[80px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.4),0_2px_5px_rgba(0,0,0,0.2)]">
            <div class="info-label text-xs uppercase tracking-wider text-slate-300"><i class="far fa-hourglass mr-1"></i>TOTAL</div>
            <div class="info-value text-base font-semibold font-mono text-accent-minute" id="infoDuration">--:--:--</div>
          </div>
          <div class="info-card bg-card rounded-2xl py-2 px-3 text-center flex-1 min-w-[80px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.4),0_2px_5px_rgba(0,0,0,0.2)]">
            <div class="info-label text-xs uppercase tracking-wider text-slate-300"><i class="fas fa-play mr-1"></i>START</div>
            <div class="info-value text-base font-semibold font-mono text-accent-minute" id="infoStart">--:--:--</div>
          </div>
          <div class="info-card bg-card rounded-2xl py-2 px-3 text-center flex-1 min-w-[80px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.4),0_2px_5px_rgba(0,0,0,0.2)]">
            <div class="info-label text-xs uppercase tracking-wider text-slate-300"><i class="fas fa-flag-checkered mr-1"></i>FINISH</div>
            <div class="info-value text-base font-semibold font-mono text-accent-minute" id="infoEnd">--:--:--</div>
          </div>
        </div>

        <!-- Duration Inputs -->
        <div class="duration-row flex flex-wrap gap-3 items-center justify-center bg-card rounded-[3rem] py-2 px-4 my-4" id="durationRow">
          <div class="dur-group bg-slate-900 rounded-[2rem] py-1 px-4 inline-flex items-center gap-2">
            <label for="durationMins" class="text-xs text-slate-300"><i class="far fa-clock mr-1"></i>min</label>
            <input type="number" id="durationMins" class="dur-input bg-slate-800 border-0 py-1.5 px-2.5 rounded-[2rem] text-accent-minute w-[70px] text-center font-semibold font-mono focus:ring-2 focus:ring-accent-minute/50 outline-none" value="90" min="1" max="720" step="1">
          </div>
          <div class="dur-group bg-slate-900 rounded-[2rem] py-1 px-4 inline-flex items-center gap-2">
            <label for="durationSecs" class="text-xs text-slate-300"><i class="far fa-clock mr-1"></i>sec</label>
            <input type="number" id="durationSecs" class="dur-input bg-slate-800 border-0 py-1.5 px-2.5 rounded-[2rem] text-accent-minute w-[70px] text-center font-semibold font-mono focus:ring-2 focus:ring-accent-minute/50 outline-none" value="0" min="0" max="59" step="1">
          </div>
          <button id="setDurationBtn" class="btn btn-primary bg-accent-hour text-white border-0 py-2.5 px-5 rounded-[2rem] font-semibold cursor-pointer transition-all active:scale-95 shadow-md hover:bg-rose-600">
            <i class="fas fa-sync-alt mr-1"></i>Update
          </button>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons flex gap-4 justify-center my-5">
          <button id="startTimerBtn" class="btn btn-primary bg-accent-hour text-white border-0 py-2.5 px-5 rounded-[2rem] font-semibold cursor-pointer transition-all active:scale-95 shadow-md hover:bg-rose-600">
            <i class="fas fa-play mr-1"></i>START
          </button>
          <button id="pauseTimerBtn" class="btn btn-warning bg-accent-minute text-slate-900 border-0 py-2.5 px-5 rounded-[2rem] font-semibold cursor-pointer transition-all active:scale-95 shadow-md hover:bg-yellow-400">
            <i class="fas fa-pause mr-1"></i>PAUSE
          </button>
          <button id="resetTimerBtn" class="btn btn-danger bg-accent-second text-slate-900 border-0 py-2.5 px-5 rounded-[2rem] font-semibold cursor-pointer transition-all active:scale-95 shadow-md hover:bg-emerald-400">
            <i class="fas fa-undo-alt mr-1"></i>RESET
          </button>
        </div>

        <!-- Status Message -->
        <div class="status-msg bg-slate-900 text-center py-2 px-4 rounded-[2rem] text-xs text-accent-minute mt-4" id="statusMsg" role="status" aria-live="polite">
          <i class="fas fa-cog mr-1"></i>Ready to begin
        </div>
      </div>
    </div>

    <!-- Mode Switch -->
    <div class="mode-switch w-full flex justify-center gap-2.5 flex-wrap py-3 mt-auto">
      <button class="view-option bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" data-view="classic" aria-label="Classic mode: analog clock only">
        <i class="far fa-clock mr-1"></i>Classic
      </button>
      <button class="view-option bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" data-view="modern" aria-label="Modern mode: digital clock only">
        <i class="fas fa-digital-tiling mr-1"></i>Modern
      </button>
      <button class="view-option bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" data-view="standard" aria-label="Standard mode: both clocks">
        <i class="fas fa-table-cells mr-1"></i>Standard
      </button>
      <button class="view-option bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" data-view="split" aria-label="Split view: clocks and timer">
        <i class="fas fa-columns mr-1"></i>Split View
      </button>
      <button class="view-option bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" data-view="timerfocus" aria-label="Timer focus: timer only">
        <i class="fas fa-pencil-alt mr-1"></i>Timer Focus
      </button>
      <button class="theme-toggle bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" id="themeToggle" title="Toggle light/dark theme">
        <i class="fas fa-sun mr-1"></i>Light
      </button>
      <button class="fullscreen-btn bg-slate-700 border-0 py-1.5 px-3 rounded-[40px] text-xs font-medium text-slate-200 cursor-pointer transition hover:bg-slate-600" id="fullscreenBtn" title="Toggle full screen">
        ⛶ Fullscreen
      </button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 flex items-center justify-center z-50 hidden transition-opacity transition-all duration-300 ease-out">

    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-md transition-all duration-300 ease-out" id="modalBackdrop"></div>

    <div class="bg-panel rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl relative z-10 border border-white/10 transform transition-all duration-300 ease-out scale-95">
      <h3 class="text-2xl font-bold mb-6 text-white flex items-center">
        <i class="fas fa-sliders-h mr-3 text-accent-minute"></i>Timer Settings
      </h3>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Context / Title</label>
          <input type="text" id="contextInput" placeholder="e.g., Exam, Workout, Coding" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-white focus:ring-2 focus:ring-accent-minute outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Subject / Topic</label>
          <input type="text" id="subjectInput" placeholder="e.g., Mathematics, Project Alpha" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-white focus:ring-2 focus:ring-accent-minute outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Notes</label>
          <textarea id="notesInput" rows="2" placeholder="Additional notes..." class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-white focus:ring-2 focus:ring-accent-minute outline-none"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-8">
        <button id="closeSettingsBtn" class="px-5 py-2 rounded-full bg-slate-700 text-white hover:bg-slate-600 transition">Cancel</button>
        <button id="saveSettingsBtn" class="px-5 py-2 rounded-full bg-accent-minute text-slate-900 font-semibold hover:bg-yellow-400 transition">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
